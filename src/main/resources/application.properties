spring.application.name=goinggoing

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/goinggoing}
spring.datasource.username=${DB_USERNAME:goinggoing_user}
spring.datasource.password=${DB_PASSWORD:goinggoing_password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never
