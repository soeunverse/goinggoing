spring:
  application:
    name: goinggoing
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/goinggoing}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

auth:
  jwt:
    secret: ${JWT_SECRET:goinggoing-local-jwt-secret-goinggoing-local-jwt-secret}
    zone-id: ${JWT_ZONE_ID:Asia/Seoul}
  token:
    access-token-expires-in-seconds: ${ACCESS_TOKEN_EXPIRES_IN_SECONDS:3600}
    refresh-token-expires-in-days: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:14}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  override-with-generic-response: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081,http://localhost:19006}

kto:
  service-key: ${KTO_SERVICE_KEY:}
  sync:
    enabled: ${KTO_SYNC_ENABLED:false}
    base-ym: ${KTO_BASE_YM:202503}
    demand-rows: ${KTO_DEMAND_ROWS:100}
    related-place-rows: ${KTO_RELATED_PLACE_ROWS:20}
  regional-demand:
    base-url: ${KTO_REGIONAL_DEMAND_BASE_URL:https://apis.data.go.kr/B551011/AreaTarResDemService}
  related-place:
    base-url: ${KTO_RELATED_PLACE_BASE_URL:https://apis.data.go.kr/B551011/TarRlteTarService1}
