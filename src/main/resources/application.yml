spring:
  application:
    name: goinggoing
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/goinggoing}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

auth:
  jwt:
    secret: ${JWT_SECRET:goinggoing-local-jwt-secret-goinggoing-local-jwt-secret}
    zone-id: ${JWT_ZONE_ID:Asia/Seoul}
  token:
    access-token-expires-in-seconds: ${ACCESS_TOKEN_EXPIRES_IN_SECONDS:3600}
    refresh-token-expires-in-days: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:14}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  override-with-generic-response: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081,http://localhost:19006}
